<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="webTitleTag">Tuốn Tài Liệu - Trang Chủ</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6f9; color: #333; overflow-x: hidden; }

        /* ---------- HEADER ---------- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background-color: white; padding: 10px 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; width: 100%;
        }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; padding: 5px; }
        .logo-container { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .logo-text { font-size: 1.1rem; font-weight: bold; color: #d9534f; text-transform: uppercase; }
        
        /* Cụm Tìm Kiếm */
        .search-container { display: flex; align-items: center; position: relative; }
        .search-input-box {
            display: none; width: 180px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 0.9rem; margin-right: 5px;
        }
        .search-input-box.active { display: block; }
        .search-btn { font-size: 20px; cursor: pointer; background: none; border: none; padding: 5px; }

        /* Khung Gợi Ý Tìm Kiếm */
        .suggestions-box {
            position: absolute; top: 40px; right: 0; width: 220px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: none; flex-direction: column; max-height: 200px; overflow-y: auto; z-index: 110;
        }
        .suggestions-box.active { display: flex; }
        .suggestion-item {
            padding: 10px 12px; font-size: 0.9rem; color: #333; text-decoration: none; border-bottom: 1px solid #f0f0f0; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .suggestion-item:hover { background-color: #f5f5f5; color: #d9534f; }
        .no-result { padding: 10px; font-size: 0.9rem; color: #999; text-align: center; }

        /* ---------- SIDEBAR ---------- */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 250px; height: 100%; background-color: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            transition: transform 0.3s ease; padding: 20px; z-index: 200; visibility: hidden; 
        }
        .sidebar.active { transform: translateX(280px); visibility: visible; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .sidebar-title { font-weight: bold; color: #333; margin: 0; }
        .close-btn { font-size: 24px; background: none; border: none; cursor: pointer; color: #999; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 15px; }
        .sidebar-item { text-decoration: none; color: #444; font-size: 1.05rem; padding: 10px; border-radius: 5px; display: flex; align-items: center; gap: 8px; }
        .sidebar-item:hover { background-color: #f0f0f0; color: #d9534f; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* ---------- NỘI DUNG CHÍNH ---------- */
        .content { padding: 20px; width: 100%; }
        .course-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; transition: all 0.3s ease; }
        .course-card.highlight { border: 2px solid #d9534f; background: #fff5f5; transform: scale(1.02); }
        .btn-download { display: inline-block; background: #28a745; color: white; padding: 8px 12px; text-decoration: none; border-radius: 5px; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <a href="index.html" class="logo-container">
            <img class="logo-img" src="logo.png" alt="Logo">
            <span class="logo-text" id="logoText">TUỐN TÀI LIỆU</span>
        </a>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input-box" placeholder="Tìm tài liệu..." oninput="handleSearch()">
            <button class="search-btn" onclick="toggleSearchBox()">🔍</button>
            <div id="suggestionsBox" class="suggestions-box"></div>
        </div>
    </header>

    <div class="sidebar" id="mySidebar">
        <div class="sidebar-header">
            <h3 class="sidebar-title">Danh Mục Menu</h3>
            <button class="close-btn" onclick="toggleSidebar()">✕</button>
        </div>
        <nav class="sidebar-menu">
            <a href="index.html" class="sidebar-item">🏠 Trang Chủ</a>
            <a href="lop12.html" class="sidebar-item">📚 Tài Liệu Lớp 12</a>
            <a href="https://discord.gg/Dqwtuhh3Gp" target="_blank" class="sidebar-item">💬 Server Discord Trao Đổi</a>
        </nav>
    </div>
    <div class="overlay" id="myOverlay" onclick="toggleSidebar()"></div>

    <main class="content">
        <h2 id="sectionTitle">Tài liệu mới cập nhật</h2>
        <!-- Vùng chứa danh sách file tự động -->
        <div id="documentContainer"></div>
    </main>

    <script>
        /* ========================================================
           KHU VỰC CHỈNH SỬA NHANH CHO BRO (CHỈ CẦN SỬA Ở ĐÂY)
           ======================================================== */
        
        // 1. CHỈNH SỬA TITLE / TÊN WEB TẠI ĐÂY
        const WEBSITE_TITLE = "Tuốn Tài Liệu - Trang Chủ"; 
        const LOGO_TEXT = "TUỐN TÀI LIỆU";
        const SECTION_TITLE = "Tài liệu mới cập nhật";

        // 2. QUẢN LÝ DANH SÁCH FILE TẠI ĐÂY (Thêm, bớt, sửa tùy ý)
        const DATA_DOCUMENTS = [

        ];

        /* ========================================================
           KHU VỰC HỆ THỐNG TỰ ĐỘNG XỬ LÝ (KHÔNG CẦN CHẠM VÀO)
           ======================================================== */
        document.getElementById("webTitleTag").innerText = WEBSITE_TITLE;
        document.getElementById("logoText").innerText = LOGO_TEXT;
        document.getElementById("sectionTitle").innerText = SECTION_TITLE;

        const container = document.getElementById("documentContainer");
        DATA_DOCUMENTS.forEach((doc, index) => {
            container.innerHTML += `
                <div class="course-card" id="doc-${index}">
                    <h3>${doc.title}</h3>
                    <p>${doc.desc}</p>
                    <a href="${doc.link}" target="_blank" class="btn-download">📥 Tải về ngay</a>
                </div>`;
        });

        function toggleSidebar() {
            document.getElementById("mySidebar").classList.toggle("active");
            document.getElementById("myOverlay").classList.toggle("active");
        }

        function toggleSearchBox() {
            const inputBox = document.getElementById("searchInput");
            const sugBox = document.getElementById("suggestionsBox");
            inputBox.classList.toggle("active");
            if(inputBox.classList.contains("active")) { inputBox.focus(); } else { inputBox.value = ""; sugBox.classList.remove("active"); }
        }

        function handleSearch() {
            const query = document.getElementById("searchInput").value.trim().toLowerCase();
            const sugBox = document.getElementById("suggestionsBox");
            sugBox.innerHTML = "";
            if (query === "") { sugBox.classList.remove("active"); return; }

            let hasResults = false;
            DATA_DOCUMENTS.forEach((doc, index) => {
                if (doc.title.toLowerCase().includes(query)) {
                    hasResults = true;
                    const item = document.createElement("div");
                    item.className = "suggestion-item";
                    item.innerText = doc.title;
                    item.onclick = function() {
                        sugBox.classList.remove("active");
                        document.getElementById("searchInput").value = doc.title;
                        const card = document.getElementById(`doc-${index}`);
                        card.scrollIntoView({ behavior: "smooth", block: "center" });
                        card.classList.add("highlight");
                        setTimeout(() => card.classList.remove("highlight"), 2000);
                    };
                    sugBox.appendChild(item);
                }
            });

            if (!hasResults) {
                const noResultDiv = document.createElement("div");
                noResultDiv.className = "no-result";
                noResultDiv.innerText = "Không tìm thấy tài liệu";
                sugBox.appendChild(noResultDiv);
            }
            sugBox.classList.add("active");
        }

        document.addEventListener("click", function(e) {
            if (!e.target.closest(".search-container")) { document.getElementById("suggestionsBox").classList.remove("active"); }
        });
    </script>
</body>
</html>
