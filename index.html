<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuốn Tài Liệu - Trang Chủ</title>
    <!-- Thư viện Font Awesome cho icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6f9; color: #333; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background-color: white; padding: 10px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            position: sticky; top: 0; z-index: 100; width: 100%;
        }
        .header-center { 
            position: absolute; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 8px; text-decoration: none; 
        }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; z-index: 101; padding: 5px; }
        .logo-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .logo-text { font-weight: bold; color: #d9534f; text-transform: uppercase; font-size: 1.1rem; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: -280px; width: 250px; height: 100%; background-color: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: transform 0.3s ease; padding: 20px; z-index: 200; visibility: hidden; display: flex; flex-direction: column; }
        .sidebar.active { transform: translateX(280px); visibility: visible; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .sidebar-title { margin: 0; font-size: 1.2rem; color: #333; }
        .close-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #888; padding: 0; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .sidebar-item { text-decoration: none; color: #444; font-size: 1.05rem; padding: 12px; border-radius: 50px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .sidebar-item:hover { background-color: #f0f0f0; }
        .sidebar-item.active { background-color: #d9534f; color: white; font-weight: bold; }
        .sidebar-footer { margin-top: auto; padding-top: 20px; text-align: center; border-top: 1px solid #eee; }
        .discord-link { font-size: 30px; color: #5865F2; text-decoration: none; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* KHUNG NỘI DUNG CHÍNH */
        .content { padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 60px); text-align: center; }
        .welcome-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid #ddd; max-width: 500px; width: 100%; }
        .welcome-box h2 { color: #d9534f; margin-top: 0; }
        .welcome-box p { color: #555; font-size: 1.05rem; line-height: 1.5; }
    </style>
</head>
<body>

    <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <a href="index.html" class="header-center">
            <img class="logo-img" src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/35'">
            <span class="logo-text">TUỐN TÀI LIỆU</span>
        </a>
        <!-- Đã xóa phần nút đăng nhập / avatar ở đây -->
        <div style="width: 35px;"></div> <!-- Thẻ div trống để cân bằng flexbox cho header -->
    </header>

    <div class="sidebar" id="mySidebar">
        <div class="sidebar-header">
            <h3 class="sidebar-title">Danh Mục Menu</h3>
            <button class="close-btn" onclick="toggleSidebar()">✕</button>
        </div>
        <nav class="sidebar-menu">
    <a href="index.html" class="sidebar-item">🏠 Trang Chủ</a>
    <a href="lop12.html" class="sidebar-item">📚 Tài Liệu Lớp 12</a>
    <!-- Thêm dòng này vào dưới mục Lớp 12 -->
    <a href="azota.html" class="sidebar-item">📝 Bài Tập Azota</a>
</nav>
        <div class="sidebar-footer">
            <a href="https://discord.gg/Dqwtuhh3Gp" target="_blank" class="discord-link"><i class="fab fa-discord"></i></a>
        </div>
    </div>
    <div class="overlay" id="myOverlay" onclick="toggleSidebar()"></div>

    <main class="content">
        <div class="welcome-box">
            <h2>Chào mừng đến với Tuốn Tài Liệu!</h2>
            <p>Trang web lưu trữ và chia sẻ tài liệu học tập. Hãy mở <strong>Menu</strong> góc trái màn hình để chọn danh mục tài liệu bạn cần nhé.</p>
        </div>
    </main>

    <script>
        // JS giờ chỉ còn lại hàm đóng/mở Menu
        window.toggleSidebar = () => {
            document.getElementById("mySidebar").classList.toggle("active");
            document.getElementById("myOverlay").classList.toggle("active");
        };
    </script>
</body>
</html>
